<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F4F"/>
      <stop offset="100%" stop-color="#050C24"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2D88A"/>
      <stop offset="55%" stop-color="#D4A93C"/>
      <stop offset="100%" stop-color="#9B7820"/>
    </linearGradient>
    <linearGradient id="leafR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2D88A"/>
      <stop offset="55%" stop-color="#D4A93C"/>
      <stop offset="100%" stop-color="#9B7820"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Left branch stem -->
  <path d="M 50,84 Q 18,52 50,14"
        fill="none" stroke="#B98F2A" stroke-width="1.4"
        stroke-linecap="round" opacity="0.85"/>
  <!-- Right branch stem -->
  <path d="M 50,84 Q 82,52 50,14"
        fill="none" stroke="#B98F2A" stroke-width="1.4"
        stroke-linecap="round" opacity="0.85"/>

  <!-- LEFT leaves (8 leaves arranged along curve, pointing inward-up) -->
  <g fill="url(#leaf)" stroke="#7E631C" stroke-width="0.4" stroke-linejoin="round">
    <path d="M 38,78 Q 27,76 24,68 Q 33,67 39,72 Z"/>
    <path d="M 30,70 Q 19,66 18,57 Q 27,58 33,64 Z"/>
    <path d="M 24,60 Q 14,54 16,44 Q 25,46 29,53 Z"/>
    <path d="M 22,49 Q 13,42 17,32 Q 26,35 28,42 Z"/>
    <path d="M 24,38 Q 17,30 23,21 Q 31,26 30,33 Z"/>
    <path d="M 30,28 Q 26,20 33,13 Q 39,19 35,25 Z"/>
    <path d="M 38,20 Q 36,12 44,8 Q 47,15 43,19 Z"/>
  </g>

  <!-- RIGHT leaves (mirror) -->
  <g fill="url(#leafR)" stroke="#7E631C" stroke-width="0.4" stroke-linejoin="round">
    <path d="M 62,78 Q 73,76 76,68 Q 67,67 61,72 Z"/>
    <path d="M 70,70 Q 81,66 82,57 Q 73,58 67,64 Z"/>
    <path d="M 76,60 Q 86,54 84,44 Q 75,46 71,53 Z"/>
    <path d="M 78,49 Q 87,42 83,32 Q 74,35 72,42 Z"/>
    <path d="M 76,38 Q 83,30 77,21 Q 69,26 70,33 Z"/>
    <path d="M 70,28 Q 74,20 67,13 Q 61,19 65,25 Z"/>
    <path d="M 62,20 Q 64,12 56,8 Q 53,15 57,19 Z"/>
  </g>

  <!-- Ribbon knot at the bottom -->
  <path d="M 44,82 Q 50,88 56,82 L 54,86 Q 50,90 46,86 Z"
        fill="url(#leaf)" stroke="#7E631C" stroke-width="0.4"/>

  <!-- EL monogram in centre -->
  <text x="50" y="56" text-anchor="middle"
        font-family="'Fraunces','Times New Roman',serif"
        font-style="italic" font-weight="700"
        font-size="22" fill="#F2D88A" letter-spacing="-1">EL</text>
</svg>
